<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>云音 - 在线音乐播放器</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="index.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- 背景动画 -->
    <div class="bg-animation">
      <div class="bg-blob bg-blob-1"></div>
      <div class="bg-blob bg-blob-2"></div>
      <div class="bg-blob bg-blob-3"></div>
    </div>

    <!-- 主容器 -->
    <div class="main-container">
      <!-- 顶部信息 -->
      <header class="header">
        <div class="logo">
          <span class="logo-icon">♪</span>
          <span class="logo-text">云音</span>
        </div>
        <p class="user-info">学号：24***123 姓名：kh</p>
      </header>

      <!-- 播放器主体 -->
      <div class="player-section">
        <div class="player-main">
          <!-- 黑胶唱片机容器 -->
          <div class="turntable-container">
            <!-- 唱片机底座 -->
            <div class="turntable-base">
              <!-- 黑胶唱片 -->
              <div class="vinyl-record" id="vinyl-record">
                <div class="vinyl-grooves"></div>
                <div class="vinyl-center">
                  <img src="img/record0.jpg" alt="专辑封面" class="vinyl-cover" id="vinyl-cover">
                  <div class="vinyl-spindle"></div>
                </div>
              </div>
              <!-- 唱臂 -->
              <div class="tonearm">
                <div class="tonearm-arm"></div>
                <div class="tonearm-head"></div>
              </div>
              <!-- 唱针指示灯 -->
              <div class="led-light"></div>
            </div>
          </div>

          <!-- 歌曲信息 -->
          <div class="song-info">
            <h2 id="music-title" class="song-title">歌曲一</h2>
            <p id="music-author" class="song-author">未知艺术家</p>
            <p class="song-hint">♪ 欣赏音乐 ♪</p>
          </div>

          <!-- 进度条 -->
          <div class="progress-section">
            <span id="current-time" class="time-text">00:00</span>
            <div class="progress-bar-container">
              <div class="progress-bar" id="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
                <div class="progress-thumb" id="progress-thumb"></div>
              </div>
            </div>
            <span id="duration" class="time-text">00:00</span>
          </div>

          <!-- 控制按钮 -->
          <div class="controls-section">
            <button class="control-btn" id="shuffle" title="随机播放">
              <img src="img/mode3.png" alt="随机播放">
            </button>
            <button class="control-btn" id="prev" title="上一曲">
              <img src="img/上一首.png" alt="上一曲">
            </button>
            <button class="control-btn play-btn" id="play" title="播放">
              <img src="img/继续播放.png" alt="播放">
            </button>
            <button class="control-btn" id="next" title="下一曲">
              <img src="img/下一首.png" alt="下一曲">
            </button>
            <!-- 播放列表按钮 -->
            <button class="control-btn" id="playlist-toggle" title="播放列表">
              <img src="img/列表.png" alt="播放列表">
            </button>
            <div class="volume-control">
              <button class="control-btn" id="volume" title="点击静音/取消静音">
                <img src="img/音量.png" alt="音量">
              </button>
              <div class="volume-bar-container" id="volume-bar-container">
                <div class="volume-bar" id="volume-bar">
                  <div class="volume-fill" id="volume-fill"></div>
                  <div class="volume-thumb" id="volume-thumb"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 右侧面板（歌词/播放列表切换） -->
        <div class="right-panel" id="right-panel">
          <!-- 歌词显示区域 -->
          <div class="lyrics-section" id="lyrics-section">
            <div class="panel-header">
              <h3>🎵 歌词</h3>
              <button class="panel-close" id="panel-close">×</button>
            </div>
            <div class="lyrics-container" id="lyrics-container">
              <div class="lyric-line active" id="current-lyric">♪ 欣赏音乐 ♪</div>
            </div>
          </div>

          <!-- 播放列表（默认隐藏） -->
          <div class="playlist-section" id="playlist-section">
            <div class="panel-header">
              <h3>🎵 播放列表</h3>
              <span class="playlist-count">共 <span id="playlist-count">0</span> 首</span>
            </div>
            <div class="playlist-content" id="playlist-content">
              <!-- 动态生成播放列表 -->
            </div>
          </div>
        </div>
      </div>
      </div>
    </div>

    <!-- 音频元素 -->
    <audio id="audio"></audio>

    <!-- 底部版权 -->
    <footer class="footer">
      <p>© 云音在线音乐播放器</p>
    </footer>
  </div>

  <script src="index.js"></script>
</body>
</html>
